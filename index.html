<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Smart Prep Vault | ECE Sem Exam 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0f2b3d;--gold:#f4b942;--green:#2a9d8f;--red:#e76f51;
  --ink:#1e2a32;--bg:#f0f4f8;--white:#ffffff;
  --border:#e2e8f0;--shadow:0 4px 24px rgba(0,0,0,0.08);
  --radius:20px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#0f2b3d,#1b4a6e);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.18);}
.header-top{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.header-title{font-weight:800;font-size:1.2rem;background:linear-gradient(120deg,#fff,#f9d97e);-webkit-background-clip:text;background-clip:text;color:transparent;}
.header-sub{font-size:0.68rem;opacity:.75;margin-top:2px;}
.overall-badge{background:rgba(255,255,255,.12);padding:6px 14px;border-radius:40px;text-align:center;}
.overall-num{font-weight:800;font-size:1.2rem;color:var(--gold);}
.overall-label{font-size:.65rem;opacity:.75;}
.prog-wrap{padding:0 20px 10px;}
.prog-bg{background:rgba(255,255,255,.2);border-radius:20px;overflow:hidden;}
.prog-fill{background:linear-gradient(90deg,var(--gold),#ffcd7e);height:6px;border-radius:20px;transition:width .4s cubic-bezier(.2,.9,.4,1.1);}
.tabs-scroll{overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.1);}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:4px;padding:8px 16px;min-width:max-content;}
.tab{padding:7px 13px;font-size:.72rem;font-weight:600;border-radius:40px;background:rgba(255,255,255,.08);cursor:pointer;color:rgba(255,255,255,.7);transition:.2s;}
.tab:hover{background:rgba(255,255,255,.16);}
.tab.active{background:var(--gold);color:#0f2b3d;}

/* ===== MAIN ===== */
.main{max-width:980px;margin:20px auto;padding:0 16px 80px;}

/* stats row */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{background:var(--white);border-radius:16px;padding:14px 20px;flex:1;min-width:80px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:1.6rem;font-weight:800;}
.stat-label{font-size:.7rem;color:#777;margin-top:2px;}

/* filter */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:7px 18px;border-radius:40px;border:2px solid var(--border);background:var(--white);font-size:.75rem;font-weight:600;cursor:pointer;transition:.2s;}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.reset-btn{margin-left:auto;padding:7px 14px;border-radius:40px;border:none;background:#fee2e2;color:#b91c1c;font-size:.72rem;font-weight:700;cursor:pointer;}

/* ===== SUBJECT CARD ===== */
.subject-section{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;}
.subject-header{padding:16px 20px;color:#fff;}
.subject-name{font-size:1rem;font-weight:800;}
.subject-meta{font-size:.72rem;opacity:.8;margin-top:2px;}
.subject-badge{background:rgba(255,255,255,.2);border-radius:40px;padding:4px 12px;font-size:.72rem;font-weight:700;margin-top:8px;display:inline-block;}
.mini-prog-wrap{padding:10px 20px 14px;}
.mini-prog-label{display:flex;justify-content:space-between;font-size:.68rem;color:#888;margin-bottom:4px;}
.mini-prog-bg{background:#edf2f7;border-radius:20px;height:7px;overflow:hidden;}
.mini-prog-fill{height:100%;border-radius:20px;transition:width .4s ease;}

/* PART LABEL */
.part-block{border-top:1px solid var(--border);}
.part-label{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;font-size:.75rem;font-weight:700;color:#fff;}
.part-count{background:rgba(255,255,255,.25);border-radius:20px;padding:2px 9px;font-size:.68rem;}

/* QUESTION ROW */
.q-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid #f1f5f9;transition:.15s;position:relative;}
.q-row:hover{background:#f8fafc;}
.q-row.done{background:#f0fdf4;}
.q-row.done .q-text{color:#6b7280;text-decoration:line-through;text-decoration-color:#6b7280aa;}

/* checkbox */
.cb-wrap{cursor:pointer;flex-shrink:0;padding-top:2px;}
.cb{width:20px;height:20px;border-radius:6px;border:2.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;transition:.2s;background:#fff;}
.cb.checked{background:var(--green);border-color:var(--green);}

/* question content */
.q-content{flex:1;min-width:0;}
.q-text{font-size:.82rem;line-height:1.45;color:#1e2a3a;}
.q-meta{display:flex;align-items:center;gap:6px;margin-top:4px;}
.q-num{font-size:.65rem;color:#94a3b8;}
.marks-badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;background:#e0f2fe;color:#0369a1;}
.marks-badge.m13{background:#fef3c7;color:#92400e;}
.marks-badge.m15{background:#fce7f3;color:#9d174d;}

/* action buttons */
.action-buttons{display:flex;gap:6px;flex-shrink:0;align-items:center;}
.action-btn{width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.2s;position:relative;}
.write-btn{background:#eff6ff;color:#2563eb;}
.write-btn:hover{background:#dbeafe;}
.read-btn{background:#f0fdf4;color:#16a34a;}
.read-btn:hover{background:#dcfce7;}
.read-btn.has-data::after{content:'';position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#f59e0b;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--white);border-radius:24px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:.95rem;font-weight:800;color:var(--navy);}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.modal-qtext{padding:12px 20px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:.8rem;color:#475569;line-height:1.5;}
.modal-body{padding:18px 20px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

/* Write mode */
.write-area{width:100%;border:2px solid var(--border);border-radius:14px;padding:12px;font-size:.82rem;line-height:1.6;font-family:inherit;resize:vertical;min-height:120px;transition:.2s;}
.write-area:focus{outline:none;border-color:#6366f1;}
.file-upload-zone{border:2px dashed #cbd5e1;border-radius:14px;padding:20px;text-align:center;cursor:pointer;margin-top:12px;transition:.2s;background:#fafafa;}
.file-upload-zone:hover{border-color:#6366f1;background:#eff6ff;}
.file-upload-zone input{display:none;}
.file-upload-text{font-size:.78rem;color:#94a3b8;margin-top:4px;}

/* previews */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:12px;}
.preview-item{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#f8fafc;}
.preview-img{width:100%;height:80px;object-fit:cover;display:block;}
.preview-file{padding:10px 8px;font-size:.65rem;word-break:break-all;color:#475569;text-align:center;}
.preview-file-icon{font-size:1.5rem;display:block;margin-bottom:4px;}
.remove-preview{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;line-height:1;}

/* Read mode */
.read-notes-text{background:#f8fafc;border-radius:14px;padding:16px;font-size:.83rem;line-height:1.7;white-space:pre-wrap;color:#1e2a3a;min-height:60px;border:1px solid var(--border);}
.read-empty{color:#94a3b8;font-style:italic;text-align:center;padding:24px;}
.read-files-label{font-size:.75rem;font-weight:700;color:#475569;margin:14px 0 8px;}
.read-img{width:100%;height:120px;object-fit:cover;display:block;cursor:zoom-in;transition:.2s;}
.read-img:hover{opacity:.85;}
.read-file-link{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f1f5f9;border-radius:10px;font-size:.75rem;color:#1e40af;text-decoration:none;font-weight:600;}
.read-file-link:hover{background:#dbeafe;}

/* img lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:none;align-items:center;justify-content:center;}
.lightbox.active{display:flex;}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.lightbox-close{position:fixed;top:16px;right:20px;color:#fff;font-size:2rem;cursor:pointer;z-index:2001;}

/* buttons */
.btn{padding:9px 20px;border-radius:40px;border:none;font-weight:700;font-size:.8rem;cursor:pointer;transition:.2s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:#1b4a6e;}
.btn-secondary{background:#f1f5f9;color:#475569;}
.btn-edit{background:#eff6ff;color:#2563eb;}

/* mobile */
@media(max-width:600px){
  .stats-row{gap:8px;}
  .stat-card{padding:10px 12px;}
  .stat-num{font-size:1.3rem;}
  .q-row{padding:10px 12px;gap:8px;}
  .q-text{font-size:.78rem;}
  .action-btn{width:30px;height:30px;font-size:.85rem;}
}
</style>

// ===================== STORAGE (IndexedDB for large files) =====================
const DB_NAME = "SmartPrepVault";
const DB_VER = 1;
let db = null;

function openDB(){
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("notes")) d.createObjectStore("notes");
      if(!d.objectStoreNames.contains("checks")) d.createObjectStore("checks");
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej();
  });
}

function dbGet(store, key){ return new Promise(res=>{ const tx=db.transaction(store,"readonly"); tx.objectStore(store).get(key).onsuccess=e=>res(e.target.result||null); }); }
function dbSet(store, key, val){ return new Promise(res=>{ const tx=db.transaction(store,"readwrite"); tx.objectStore(store).put(val,key).onsuccess=()=>res(); }); }
function dbDel(store, key){ return new Promise(res=>{ const tx=db.transaction(store,"readwrite"); tx.objectStore(store).delete(key).onsuccess=()=>res(); }); }

// in-memory cache
let checkState = {};  // { key: bool }
let noteCache = {};   // { key: { text, files:[{name,type,dataURL}] } }

function noteKey(subjId,secIdx,qIdx){ return `${subjId}_${secIdx}_${qIdx}`; }

async function loadAll(){
  // checks
  const checks = await dbGet("checks","all") || {};
  checkState = checks;
  // notes meta (we lazy-load per question for performance)
  const noteKeys = await dbGet("notes","__index__") || [];
  noteCache = {};
  for(const k of noteKeys){ noteCache[k] = null; } // mark as existing but not loaded
}

async function getNote(subjId,secIdx,qIdx){
  const k = noteKey(subjId,secIdx,qIdx);
  if(noteCache[k] === undefined) return { text:"", files:[] };
  if(noteCache[k] === null){ // load from db
    noteCache[k] = await dbGet("notes", k) || { text:"", files:[] };
  }
  return noteCache[k];
}

async function setNote(subjId,secIdx,qIdx,text,files){
  const k = noteKey(subjId,secIdx,qIdx);
  const note = { text, files };
  noteCache[k] = note;
  await dbSet("notes", k, note);
  // update index
  const idx = await dbGet("notes","__index__") || [];
  if(!idx.includes(k)) idx.push(k);
  await dbSet("notes","__index__",idx);
}

async function deleteNote(subjId,secIdx,qIdx){
  const k = noteKey(subjId,secIdx,qIdx);
  delete noteCache[k];
  await dbDel("notes",k);
}

function isChecked(subjId,secIdx,qIdx){ return !!checkState[noteKey(subjId,secIdx,qIdx)]; }
function hasNoteData(subjId,secIdx,qIdx){ const k=noteKey(subjId,secIdx,qIdx); return noteCache[k] !== undefined && noteCache[k] !== null && (noteCache[k].text?.trim() || noteCache[k].files?.length); }

function toggleCheck(subjId,secIdx,qIdx){
  const k = noteKey(subjId,secIdx,qIdx);
  checkState[k] = !checkState[k];
  dbSet("checks","all",checkState);
}

function countSubject(subj){
  let total=0,done=0;
  subj.sections.forEach((sec,si)=>{ sec.questions.forEach((_,qi)=>{ total++; if(isChecked(subj.id,si,qi)) done++; }); });
  return {total,done};
}
function countAll(){
  let t=0,d=0;
  SUBJECTS.forEach(s=>{ let c=countSubject(s); t+=c.total; d+=c.done; });
  return {total:t,done:d};
}

// ===================== RENDER =====================
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function marksClass(m){ if(m==="13M") return "marks-badge m13"; if(m==="15M") return "marks-badge m15"; return "marks-badge"; }

function renderQuestionRow(subj,secIdx,qIdx,q,checked){
  const k = noteKey(subj.id,secIdx,qIdx);
  const hasNote = noteCache[k] && (noteCache[k].text?.trim() || noteCache[k].files?.length);
  return `<div class="q-row${checked?' done':''}" id="qrow_${k}">
    <div class="cb-wrap" onclick="onCheck('${subj.id}',${secIdx},${qIdx})">
      <div class="cb${checked?' checked':''}">
        ${checked?`<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2"/></svg>`:''}
      </div>
    </div>
    <div class="q-content">
      <div class="q-text">${esc(q[2])}</div>
      <div class="q-meta"><span class="q-num">Q${q[0]}</span><span class="${marksClass(q[1])}">${q[1]}</span></div>
    </div>
    <div class="action-buttons">
      <button class="action-btn write-btn" title="Write notes" onclick="openWrite('${subj.id}',${secIdx},${qIdx})">✏️</button>
      <button class="action-btn read-btn${hasNote?' has-data':''}" title="Read notes" onclick="openRead('${subj.id}',${secIdx},${qIdx})">📖</button>
    </div>
  </div>`;
}

function renderSubject(subj){
  const {total,done} = countSubject(subj);
  const pct = total ? Math.round(done/total*100) : 0;
  let html = `<div class="subject-section">
    <div class="subject-header" style="background:${subj.color}">
      <div class="subject-name">${subj.name}</div>
      <div class="subject-meta">${subj.code} &nbsp;•&nbsp; ${subj.date}</div>
      <div class="subject-badge">${done}/${total} mastered</div>
    </div>
    <div class="mini-prog-wrap">
      <div class="mini-prog-label"><span>${pct}% done</span><span>${total-done} remaining</span></div>
      <div class="mini-prog-bg"><div class="mini-prog-fill" style="width:${pct}%;background:${subj.color}"></div></div>
    </div>`;
  subj.sections.forEach((sec,si)=>{
    let secHtml = `<div class="part-block">
      <div class="part-label" style="background:${sec.color}">
        <span>${sec.label}</span>
        <span class="part-count">${sec.questions.filter((_,qi)=>isChecked(subj.id,si,qi)).length}/${sec.questions.length}</span>
      </div>`;
    sec.questions.forEach((q,qi)=>{
      const checked = isChecked(subj.id,si,qi);
      if(filterMode==="done" && !checked) return;
      if(filterMode==="unread" && checked) return;
      secHtml += renderQuestionRow(subj,si,qi,q,checked);
    });
    secHtml += `</div>`;
    html += secHtml;
  });
  html += `</div>`;
  return html;
}

function renderAll(){
  renderTabs();
  renderOverall();
  const subj = SUBJECTS[activeSubject];
  const {total,done} = countSubject(subj);
  let html = `<div class="stats-row">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Qs</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#16a34a">${done}</div><div class="stat-label">Mastered</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#dc2626">${total-done}</div><div class="stat-label">Remaining</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn${filterMode==='all'?' active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn${filterMode==='unread'?' active':''}" onclick="setFilter('unread')">Unread</button>
    <button class="filter-btn${filterMode==='done'?' active':''}" onclick="setFilter('done')">Mastered</button>
    <button class="reset-btn" onclick="resetSubject()">🔄 Reset</button>
  </div>`;
  html += renderSubject(subj);
  document.getElementById("main").innerHTML = html;
}

function renderTabs(){
  document.getElementById("tabs").innerHTML = SUBJECTS.map((s,i)=>{
    const {total,done} = countSubject(s);
    const pct = total ? Math.round(done/total*100) : 0;
    return `<div class="tab${i===activeSubject?' active':''}" onclick="switchSubject(${i})">${s.code} <span style="font-size:.65rem;opacity:.8">${pct}%</span></div>`;
  }).join('');
}

function renderOverall(){
  const {total,done} = countAll();
  document.getElementById("overallNum").textContent = `${done}/${total}`;
  document.getElementById("overallBar").style.width = (total ? done/total*100 : 0)+"%";
}

// ===================== ACTIONS =====================
window.switchSubject = (i) => { activeSubject=i; filterMode="all"; renderAll(); };
window.setFilter = (m) => { filterMode=m; renderAll(); };
window.onCheck = (subjId,secIdx,qIdx) => {
  toggleCheck(subjId,secIdx,qIdx);
  renderAll();
  const subj = SUBJECTS.find(s=>s.id===subjId);
  const {total,done} = countSubject(subj);
  if(total===done) setTimeout(()=>alert(`🎉 All ${subj.code} questions mastered!`),100);
};
window.resetSubject = () => {
  const subj = SUBJECTS[activeSubject];
  if(!confirm(`Reset ALL progress & notes for ${subj.code}?`)) return;
  subj.sections.forEach((sec,si)=>{ sec.questions.forEach((_,qi)=>{ 
    const k=noteKey(subj.id,si,qi);
    delete checkState[k];
    delete noteCache[k];
    dbDel("notes",k);
  }); });
  dbSet("checks","all",checkState);
  renderAll();
};

// ===================== MODAL =====================
let modalCtx = null;
let pendingFiles = [];

function closeModal(){
  document.getElementById("noteModal").classList.remove("active");
  document.getElementById("modalBody").innerHTML="";
  document.getElementById("modalFooter").innerHTML="";
  modalCtx=null; pendingFiles=[];
}
document.getElementById("noteModal").onclick = e => { if(e.target===document.getElementById("noteModal")) closeModal(); };

async function openWrite(subjId,secIdx,qIdx){
  const subj = SUBJECTS.find(s=>s.id===subjId);
  const q = subj.sections[secIdx].questions[qIdx];
  const note = await getNote(subjId,secIdx,qIdx);
  modalCtx = {subjId,secIdx,qIdx,note};
  pendingFiles = [];

  document.getElementById("modalTitle").textContent = "✏️ Write Notes";
  document.getElementById("modalQText").textContent = `Q${q[0]} [${q[1]}] — ${q[2]}`;

  // existing files
  let existingHtml = '';
  if(note.files?.length){
    existingHtml = `<div style="margin-top:14px;"><div style="font-size:.75rem;font-weight:700;color:#475569;margin-bottom:8px;">📎 Existing Attachments</div>
      <div class="preview-grid">${note.files.map((f,idx)=>`
        <div class="preview-item">
          ${f.type.startsWith('image/')?`<img class="preview-img" src="${f.dataURL}" onclick="showLightbox('${esc(f.dataURL)}')" alt=""/>`
          :`<div class="preview-file"><span class="preview-file-icon">📄</span>${esc(f.name)}</div>`}
          <button class="remove-preview" onclick="removeExistingFile(${idx})" title="Remove">✕</button>
        </div>`).join('')}
      </div></div>`;
  }

  document.getElementById("modalBody").innerHTML = `
    <textarea class="write-area" id="noteTA" placeholder="Write your explanation, key points, formulas, hints...">${esc(note.text||"")}</textarea>
    <div class="file-upload-zone" onclick="document.getElementById('fileInp').click()">
      <div style="font-size:1.5rem">📎</div>
      <div style="font-size:.82rem;font-weight:700;color:#475569;margin-top:6px;">Attach Images or Files</div>
      <div class="file-upload-text">Click to browse — images, PDFs, any file type</div>
      <input type="file" id="fileInp" multiple accept="*/*">
    </div>
    <div class="preview-grid" id="newFilesPreview"></div>
    ${existingHtml}`;

  document.getElementById("modalFooter").innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveNote()">💾 Save Notes</button>`;

  document.getElementById("noteModal").classList.add("active");

  document.getElementById("fileInp").onchange = async e => {
    pendingFiles = [];
    document.getElementById("newFilesPreview").innerHTML = "";
    for(const file of Array.from(e.target.files)){
      const dataURL = await readFile(file);
      pendingFiles.push({ name:file.name, type:file.type, dataURL });
      const item = document.createElement("div");
      item.className = "preview-item";
      item.innerHTML = file.type.startsWith('image/')
        ? `<img class="preview-img" src="${dataURL}" onclick="showLightbox('${dataURL.replace(/'/g,"\\'")}')" />`
        : `<div class="preview-file"><span class="preview-file-icon">📄</span>${esc(file.name)}</div>`;
      document.getElementById("newFilesPreview").appendChild(item);
    }
  };
}

window.removeExistingFile = (idx) => {
  if(!modalCtx) return;
  const note = modalCtx.note;
  note.files.splice(idx,1);
  openWrite(modalCtx.subjId,modalCtx.secIdx,modalCtx.qIdx);
};

window.saveNote = async () => {
  if(!modalCtx) return;
  const {subjId,secIdx,qIdx,note} = modalCtx;
  const text = document.getElementById("noteTA").value;
  const files = [...(note.files||[]), ...pendingFiles];
  await setNote(subjId,secIdx,qIdx,text,files);
  closeModal();
  renderAll();
  // show toast
  showToast("✨ Notes saved!");
};

async function openRead(subjId,secIdx,qIdx){
  const subj = SUBJECTS.find(s=>s.id===subjId);
  const q = subj.sections[secIdx].questions[qIdx];
  const note = await getNote(subjId,secIdx,qIdx);

  document.getElementById("modalTitle").textContent = "📖 Read Notes";
  document.getElementById("modalQText").textContent = `Q${q[0]} [${q[1]}] — ${q[2]}`;

  const hasText = note.text?.trim();
  const hasFiles = note.files?.length > 0;

  let body = '';
  if(!hasText && !hasFiles){
    body = `<div class="read-empty">📭 No notes yet for this question.<br><span style="font-size:.75rem;">Tap ✏️ Write to add your notes!</span></div>`;
  } else {
    if(hasText){
      body += `<div style="margin-bottom:14px;"><div style="font-size:.75rem;font-weight:700;color:#475569;margin-bottom:8px;">✍️ Your Notes</div>
        <div class="read-notes-text">${esc(note.text)}</div></div>`;
    }
    if(hasFiles){
      body += `<div class="read-files-label">📎 Attachments (${note.files.length})</div><div class="preview-grid">`;
      for(const f of note.files){
        if(f.type.startsWith('image/')){
          body += `<div class="preview-item"><img class="read-img" src="${f.dataURL}" onclick="showLightbox('${f.dataURL.replace(/'/g,"\\'")}')" title="Click to zoom" /></div>`;
        } else {
          body += `<div class="preview-item"><div class="preview-file"><span class="preview-file-icon">📄</span><a class="read-file-link" href="${f.dataURL}" download="${esc(f.name)}" target="_blank">⬇ ${esc(f.name)}</a></div></div>`;
        }
      }
      body += `</div>`;
    }
  }

  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalFooter").innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    <button class="btn btn-edit" onclick="closeModal();openWrite('${subjId}',${secIdx},${qIdx})">✏️ Edit Notes</button>`;
  document.getElementById("noteModal").classList.add("active");
}

// expose
window.openWrite = openWrite;
window.openRead = openRead;
window.closeModal = closeModal;

// ===================== LIGHTBOX =====================
window.showLightbox = (src) => {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("active");
};
window.closeLightbox = () => {
  document.getElementById("lightbox").classList.remove("active");
  document.getElementById("lightboxImg").src = "";
};
document.getElementById("lightbox").onclick = e => { if(e.target===document.getElementById("lightbox")) closeLightbox(); };

// ===================== UTILS =====================
function readFile(file){
  return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(file); });
}

function showToast(msg){
  const t = document.createElement("div");
  t.textContent = msg;
  Object.assign(t.style,{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",
    background:"#1e2a3a",color:"#fff",padding:"10px 22px",borderRadius:"40px",
    fontSize:".82rem",fontWeight:"700",zIndex:"9999",boxShadow:"0 4px 20px rgba(0,0,0,.3)",
    transition:"opacity .4s"});
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; setTimeout(()=>t.remove(),400); }, 2000);
}

// ===================== INIT =====================
openDB().then(()=>loadAll()).then(()=>renderAll());
</script>
