<title>Important Questions Tracker</title>
<style>
  :root {
    --navy: #1F3864;
    --blue: #2E5090;
    --lblue: #EEF2F8;
    --gold: #E8A020;
    --green: #117A65;
    --red: #C00000;
    --purple: #7D3C98;
    --teal: #0B5345;
    --orange: #B7950B;
    --dkred: #922B21;
    --dkblue: #1B4F72;
    --ink: #1a1a2e;
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #dde3ef;
    --text: #222;
    --muted: #666;
    --success-bg: #e8f8f0;
    --success-border: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  /* HEADER */
  .header {
    background: var(--navy);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-top {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3px; }
  .header-subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .overall-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .overall-count {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--gold);
  }
  .overall-label { font-size: 0.75rem; color: rgba(255,255,255,0.7); }
  .progress-bar-wrap {
    background: var(--navy);
    padding: 0 24px 10px;
  }
  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f0d060);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  /* TABS */
  .tabs-wrap {
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.1);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 16px;
    min-width: max-content;
  }
  .tab {
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { color: rgba(255,255,255,0.85); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  /* SUBJECT CARD */
  .subject-section { display: none; }
  .subject-section.active { display: block; }
  .subject-header-bar {
    border-radius: 10px 10px 0 0;
    padding: 16px 20px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 0;
  }
  .subject-name { font-size: 1.1rem; font-weight: 700; }
  .subject-meta { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }
  .subject-badge {
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }
  /* PART SECTION */
  .part-block {
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .part-block:last-child { border-radius: 0 0 10px 10px; }
  .part-label {
    padding: 10px 18px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .part-count {
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
  }
  /* QUESTION ROW */
  .q-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  .q-row:last-child { border-bottom: none; }
  .q-row:hover { background: #f8faff; }
  .q-row.done { background: var(--success-bg); }
  .q-row.done:hover { background: #d4f4e4; }
  /* CHECKBOX */
  .cb-wrap {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .cb {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    background: white;
  }
  .cb.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .cb svg { display: none; }
  .cb.checked svg { display: block; }
  /* Q CONTENT */
  .q-content { flex: 1; min-width: 0; }
  .q-text {
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--text);
    transition: color 0.15s;
  }
  .q-row.done .q-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--green);
  }
  .q-meta {
    display: flex;
    gap: 6px;
    margin-top: 5px;
    align-items: center;
  }
  .q-num {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 600;
  }
  .marks-badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 10px;
    background: #fef0e6;
    color: #c05000;
  }
  .marks-badge.two { background: #e8f0fe; color: #1a56a0; }
  .marks-badge.lab { background: #e8f8f0; color: #117A65; }
  /* STATS ROW */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--navy); }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
  .filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
  .reset-btn {
    margin-left: auto;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #ffb3b3;
    background: #fff5f5;
    color: var(--red);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: white; border-color: var(--red); }
  /* MINI PROGRESS */
  .mini-prog-wrap { margin-top: 8px; }
  .mini-prog-bg {
    height: 5px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 5px;
  }
  .mini-prog-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .mini-prog-label {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  /* CELEBRATION */
  .celebrate {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--navy);
    color: white;
    padding: 30px 40px;
    border-radius: 16px;
    text-align: center;
    z-index: 999;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: popIn 0.3s ease;
  }
  .celebrate.show { display: block; }
  @keyframes popIn {
    0% { transform: translate(-50%,-50%) scale(0.7); opacity: 0; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  }
  .celebrate-icon { font-size: 3rem; margin-bottom: 10px; }
  .celebrate-title { font-size: 1.4rem; font-weight: 800; color: var(--gold); }
  .celebrate-sub { font-size: 0.9rem; color: rgba(255,255,255,0.75); margin-top: 6px; }
  .celebrate-close {
    margin-top: 18px;
    padding: 8px 24px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 20px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    .header-top { padding: 12px 16px; }
    .main { padding: 14px 10px 60px; }
    .q-row { padding: 10px 14px; }
    .q-text { font-size: 0.84rem; }
  }
</style>
</head>

// ── STATE ────────────────────────────────────────────────────────────────────
const STATE_KEY = "iqtracker_v1";
let state = {};
try { state = JSON.parse(localStorage.getItem(STATE_KEY) || "{}"); } catch(e) { state = {}; }

function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

function qKey(subjectId, secIdx, qIdx) {
  return `${subjectId}_${secIdx}_${qIdx}`;
}

function isChecked(subjectId, secIdx, qIdx) {
  return !!state[qKey(subjectId, secIdx, qIdx)];
}

function toggle(subjectId, secIdx, qIdx) {
  const k = qKey(subjectId, secIdx, qIdx);
  state[k] = !state[k];
  saveState();
}

// ── COUNT HELPERS ─────────────────────────────────────────────────────────────
function countSubject(subj) {
  let total = 0, done = 0;
  subj.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      total++;
      if (isChecked(subj.id, si, qi)) done++;
    });
  });
  return { total, done };
}

function countAll() {
  let total = 0, done = 0;
  SUBJECTS.forEach(s => {
    const c = countSubject(s);
    total += c.total; done += c.done;
  });
  return { total, done };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
let activeSubject = 0;
let filterMode = "all"; // all | unread | done

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  SUBJECTS.forEach((s, i) => {
    const { total, done } = countSubject(s);
    const pct = total ? Math.round(done/total*100) : 0;
    const tab = document.createElement("div");
    tab.className = "tab" + (i === activeSubject ? " active" : "");
    tab.innerHTML = `${s.code} <span style="opacity:0.65;font-size:0.68rem;margin-left:4px">${pct}%</span>`;
    tab.onclick = () => { activeSubject = i; filterMode = "all"; renderAll(); };
    tabsEl.appendChild(tab);
  });
}

function renderOverall() {
  const { total, done } = countAll();
  document.getElementById("overall-count").textContent = `${done} / ${total}`;
  const pct = total ? done/total*100 : 0;
  document.getElementById("overall-bar").style.width = pct + "%";
}

function marksClass(m) {
  if (m === "2M") return "marks-badge two";
  if (m === "Lab") return "marks-badge lab";
  return "marks-badge";
}

function renderSection(subj, sec, secIdx) {
  const questions = sec.questions.filter((q, qi) => {
    const checked = isChecked(subj.id, secIdx, qi);
    if (filterMode === "done") return checked;
    if (filterMode === "unread") return !checked;
    return true;
  });

  if (questions.length === 0) return "";

  let html = `<div class="part-block">
    <div class="part-label" style="background:${sec.color}">
      <span>${sec.label}</span>
      <span class="part-count">${countSecDone(subj.id, secIdx, sec.questions)} / ${sec.questions.length}</span>
    </div>`;

  sec.questions.forEach((q, qi) => {
    const checked = isChecked(subj.id, secIdx, qi);
    if (filterMode === "done" && !checked) return;
    if (filterMode === "unread" && checked) return;
    html += `
    <div class="q-row${checked ? " done" : ""}" onclick="handleCheck('${subj.id}',${secIdx},${qi})">
      <div class="cb-wrap">
        <div class="cb${checked ? " checked" : ""}">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="q-content">
        <div class="q-text">${q[2]}</div>
        <div class="q-meta">
          <span class="q-num">Q${q[0]}</span>
          <span class="${marksClass(q[1])}">${q[1]}</span>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function countSecDone(subjId, secIdx, questions) {
  return questions.filter((q, qi) => isChecked(subjId, secIdx, qi)).length;
}

function renderSubject(subj) {
  const { total, done } = countSubject(subj);
  const pct = total ? Math.round(done/total*100) : 0;

  let html = `
  <div style="margin-bottom:16px">
    <div class="subject-header-bar" style="background:${subj.color}">
      <div>
        <div class="subject-name">${subj.name}</div>
        <div class="subject-meta">${subj.code} &nbsp;|&nbsp; Exam: ${subj.date}</div>
      </div>
      <div class="subject-badge">${done}/${total} read</div>
    </div>
    <div style="background:rgba(0,0,0,0.06);padding:10px 18px;border-radius:0;border:1px solid ${subj.color}20;border-top:none;">
      <div class="mini-prog-label"><span>${pct}% complete</span><span>${total-done} remaining</span></div>
      <div class="mini-prog-bg">
        <div class="mini-prog-fill" style="width:${pct}%;background:${subj.color}"></div>
      </div>
    </div>
  </div>`;

  subj.sections.forEach((sec, si) => {
    html += renderSection(subj, sec, si);
  });

  return html;
}

function renderMain() {
  const subj = SUBJECTS[activeSubject];
  const { total, done } = countSubject(subj);
  const main = document.getElementById("main");

  let html = `
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Questions</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Read ✓</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${total-done}</div><div class="stat-label">Remaining</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn${filterMode==='all'?' active':''}" onclick="setFilter('all')">All (${total})</button>
    <button class="filter-btn${filterMode==='unread'?' active':''}" onclick="setFilter('unread')">Unread (${total-done})</button>
    <button class="filter-btn${filterMode==='done'?' active':''}" onclick="setFilter('done')">Read (${done})</button>
    <button class="reset-btn" onclick="resetSubject()">Reset Subject</button>
  </div>`;

  html += renderSubject(subj);
  main.innerHTML = html;
}

function renderAll() {
  renderTabs();
  renderOverall();
  renderMain();
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
window.handleCheck = function(subjId, secIdx, qIdx) {
  const subj = SUBJECTS.find(s => s.id === subjId);
  const wasDone = isChecked(subjId, secIdx, qIdx);
  toggle(subjId, secIdx, qIdx);
  renderAll();
  // check if subject completed
  if (!wasDone) {
    const { total, done } = countSubject(subj);
    if (total === done) {
      document.getElementById("celebrate-title").textContent = subj.code + " Complete!";
      document.getElementById("celebrate-sub").textContent = `All ${total} questions read for ${subj.name}`;
      document.getElementById("celebrate").classList.add("show");
    }
  }
};

window.setFilter = function(mode) {
  filterMode = mode;
  renderMain();
};

window.resetSubject = function() {
  const subj = SUBJECTS[activeSubject];
  if (!confirm(`Reset all checkboxes for ${subj.code}? This cannot be undone.`)) return;
  subj.sections.forEach((sec, si) => {
    sec.questions.forEach((q, qi) => {
      delete state[qKey(subj.id, si, qi)];
    });
  });
  saveState();
  renderAll();
};

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
